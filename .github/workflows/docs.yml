name: Docs

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install sphinx pyyaml numpy

      - name: Compile sources
        run: python -m compileall spades docs

      - name: Build docs (warnings as errors)
        run: python -m sphinx -W -b html docs docs/_build/html
